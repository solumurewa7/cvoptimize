<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <!-- Background -->
  <rect width="1200" height="630" fill="#060d1f"/>

  <!-- Subtle top glow -->
  <radialGradient id="glow" cx="50%" cy="0%" r="60%">
    <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.18"/>
    <stop offset="100%" stop-color="#3b82f6" stop-opacity="0"/>
  </radialGradient>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- Grid lines (subtle) -->
  <line x1="0" y1="315" x2="1200" y2="315" stroke="#ffffff" stroke-opacity="0.03" stroke-width="1"/>
  <line x1="600" y1="0" x2="600" y2="630" stroke="#ffffff" stroke-opacity="0.03" stroke-width="1"/>

  <!-- Logo mark (centred, above text) -->
  <g transform="translate(556, 190)">
    <rect width="88" height="88" rx="20" fill="#3b82f6" opacity="0.15"/>
    <rect x="14" y="14" width="26" height="32" rx="5" fill="white" opacity="0.9"/>
    <rect x="48" y="14" width="26" height="14" rx="5" fill="white" opacity="0.6"/>
    <rect x="48" y="34" width="26" height="14" rx="5" fill="white" opacity="0.6"/>
    <rect x="14" y="52" width="60" height="7" rx="3" fill="white" opacity="0.4"/>
    <rect x="14" y="65" width="40" height="7" rx="3" fill="white" opacity="0.4"/>
  </g>

  <!-- CVOptimize wordmark -->
  <text
    x="600"
    y="345"
    text-anchor="middle"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
    font-size="72"
    font-weight="800"
    letter-spacing="-3"
    fill="white"
  >CVO<tspan fill="#3b82f6">ptimize</tspan></text>

  <!-- Tagline -->
  <text
    x="600"
    y="410"
    text-anchor="middle"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
    font-size="26"
    font-weight="400"
    fill="#94a3b8"
    letter-spacing="0"
  >AI-Powered Resume Analyser · Free to use</text>

  <!-- Bottom badge -->
  <rect x="460" y="468" width="280" height="40" rx="20" fill="#3b82f6" fill-opacity="0.12" stroke="#3b82f6" stroke-opacity="0.3" stroke-width="1"/>
  <text
    x="600"
    y="493"
    text-anchor="middle"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
    font-size="16"
    font-weight="600"
    fill="#3b82f6"
    letter-spacing="1"
  >cvooptimize.com</text>
</svg>
